<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>备件采购管理系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
body{display:flex;height:100vh;background:#f5f7fa}
.sidebar{width:220px;background:#2d374b;color:#fff;height:100%;padding-top:20px}
.sidebar .logo{text-align:center;font-size:16px;padding-bottom:20px;border-bottom:1px solid #444;margin-bottom:10px}
.menu{list-style:none}
.menu li{padding:12px 20px;font-size:14px;color:#c0c6cc;cursor:pointer}
.menu li.active{background:#1677ff;color:#fff}
.menu li:hover{background:#404c62;color:#fff}
.content{flex:1;padding:20px;overflow:auto}
.page-title{font-size:16px;margin-bottom:16px}
.tool-bar{display:flex;justify-content:space-between;margin-bottom:16px}
button{height:32px;padding:0 16px;border-radius:4px;border:1px solid #dcdfe6;background:#fff;cursor-pointer}
button.primary{background:#1677ff;color:#fff;border-color:#1677ff}
.search-wrap{background:#fff;padding:16px;border-radius:4px;display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px}
.search-item{display:flex;align-items:center}
.search-item label{width:70px;font-size:14px;color:#666}
.search-item input,.search-item select{height:32px;padding:0 8px;border:1px solid #dcdfe6;border-radius:4px;width:160px}
.table-box{background:#fff;border-radius:4px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{height:40px;background:#fafafa;font-size:14px;color:#666;font-weight:400}
td{height:46px;padding:0 12px;border-top:1px solid #f0f0f0;font-size:14px}
.status{padding:2px 8px;border-radius:4px;font-size:12px}
.wait{background:#fff7e6;color:#ff7d00}
.ing{background:#ecf5ff;color:#1677ff}
.success{background:#f0f9ff;color:#00b42a}
.oper a{color:#1677ff;margin:0 4px;text-decoration:none}
.pagination{margin-top:16px;display:flex;justify-content:flex-end;gap:8px}
</style>
</head>
<body>
<div class="sidebar">
  <div class="logo">备件采购管理系统</div>
  <ul class="menu">
    <li class="active">备件采购列表</li>
    <li>采购申请</li>
    <li>采购审批</li>
    <li>采购订单</li>
    <li>入库管理</li>
    <li>供应商管理</li>
    <li>备件台账</li>
    <li>数据统计</li>
  </ul>
</div>
<div class="content">
  <div class="page-title">备件采购列表</div>
  <div class="tool-bar">
    <div></div>
    <div>
      <button>刷新</button>
      <button>导出</button>
      <button class="primary">+ 新增采购单</button>
    </div>
  </div>
  <div class="search-wrap">
    <div class="search-item"><label>采购单号</label><input placeholder="请输入"></div>
    <div class="search-item"><label>备件名称</label><input placeholder="请输入"></div>
    <div class="search-item"><label>采购状态</label><select><option>全部</option><option>待审批</option><option>采购中</option><option>已完成</option></select></div>
    <div class="search-item"><label>申请部门</label><input placeholder="请输入"></div>
    <div class="search-item"><label>申请日期</label><input type="date"></div>
    <div class="search-item"><label></label><input type="date"></div>
    <button class="primary">查询</button>
    <button>重置</button>
  </div>
  <div class="table-box">
    <table>
      <tr>
        <th>序号</th>
        <th>采购单号</th>
        <th>备件名称</th>
        <th>规格型号</th>
        <th>采购数量</th>
        <th>金额</th>
        <th>申请部门</th>
        <th>申请人</th>
        <th>申请日期</th>
        <th>状态</th>
        <th>操作</th>
      </tr>
      <tr>
        <td>1</td>
        <td>PUR202404001</td>
        <td>深沟球轴承</td>
        <td>6205ZZ</td>
        <td>20</td>
        <td>1200.00</td>
        <td>设备部</td>
        <td>张三</td>
        <td>2024-04-10</td>
        <td><span class="status wait">待审批</span></td>
        <td class="oper"><a>查看</a><a>编辑</a><a>审批</a></td>
      </tr>
      <tr>
        <td>2</td>
        <td>PUR202404002</td>
        <td>同步皮带</td>
        <td>3GT-9</td>
        <td>10</td>
        <td>850.00</td>
        <td>生产部</td>
        <td>李四</td>
        <td>2024-04-10</td>
        <td><span class="status ing">采购中</span></td>
        <td class="oper"><a>查看</a></td>
      </tr>
    </table>
  </div>
  <div class="pagination">
    共 128 条 1/10 页
    <button>上一页</button>
    <button>1</button>
    <button>2</button>
    <button>下一页</button>
  </div>
</div>
</body>
</html>
