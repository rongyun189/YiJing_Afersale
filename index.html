<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>奕境售后管理系统</title>
<style>
body{margin:0;padding:0;font-family:"Microsoft YaHei";background:#f5f5f5;}
.main{display:flex;min-height:100vh;}
.left-menu{width:220px;background:#2f4050;color:#fff;}
.left-menu ul{list-style:none;padding:0;margin:0;}
.first-menu{display:block;padding:12px 15px;background:#1f2d3d;color:#fff;text-decoration:none;font-size:14px;}
.second-menu{display:block;padding:10px 15px 10px 25px;background:#2f4050;color:#fff;text-decoration:none;font-size:13px;}
.third-menu{display:block;padding:10px 15px 10px 35px;background:#3d5166;color:#fff;text-decoration:none;font-size:13px;}
.second-menu, .third-menu{display:none;}
li:hover .second-menu{display:block;}
li:hover .third-menu{display:block;}
.right-content{flex:1;padding:20px;}
.top-box{background:#fff;padding:15px;margin-bottom:15px;border-left:4px solid #2f4050;}
.content{background:#fff;padding:20px;}
.search{margin-bottom:15px;}
.search input{padding:6px 10px;margin-right:5px;}
.search button{padding:6px 12px;background:#2f4050;color:#fff;border:none;}
table{width:100%;border-collapse:collapse;background:#fff;}
table td,table th{border:1px solid #ddd;padding:10px;text-align:left;font-size:14px;}
</style>
</head>
<body>
<div class="main">
  <div class="left-menu">
    <ul>
      <li><a class="first-menu">首页</a></li>
      <li><a class="first-menu">系统总览</a></li>
      <li><a class="first-menu">基础数据</a></li>

      <li>
        <a class="first-menu">商品管理</a>
        <a class="second-menu">商品列表</a>
        <a class="second-menu">商品分类</a>
      </li>

      <li>
        <a class="first-menu">库存管理</a>
        <a class="second-menu">库存查询</a>
        <a class="second-menu">入库管理</a>
        <a class="second-menu">出库管理</a>
      </li>

      <li>
        <a class="first-menu">备件管理</a>
        <a class="second-menu">备件信息</a>
        <a class="third-menu">备件列表</a>
        <a class="third-menu">备件入库</a>
        <a class="third-menu">备件出库</a>
        <a class="second-menu">备件分类</a>
      </li>

      <li><a class="first-menu">工单管理</a></li>
      <li><a class="first-menu">报表统计</a></li>
      <li><a class="first-menu">系统设置</a></li>
    </ul>
  </div>

  <div class="right-content">
    <div class="top-box">
      <h3>备件信息</h3>
    </div>
    <div class="content">
      <div class="search">
        <input type="text" placeholder="备件名称">
        <button>搜索</button>
        <button>新增</button>
        <button>导出</button>
      </div>
      <table>
        <tr>
          <th>备件ID</th>
          <th>备件名称</th>
          <th>规格型号</th>
          <th>库存数量</th>
          <th>操作</th>
        </tr>
        <tr>
          <td>1001</td>
          <td>空调压缩机</td>
          <td>3P</td>
          <td>25</td>
          <td>查看 编辑 删除</td>
        </tr>
      </table>
    </div>
  </div>
</div>
</body>
</html>
